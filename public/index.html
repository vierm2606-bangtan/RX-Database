<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RX Database & OKT Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #16213e; }
  .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
  .search-box { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
  .search-box input { flex: 1; padding: 0.75rem 1rem; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
  .search-box input:focus { border-color: #0f3460; }
  .search-box button { padding: 0.75rem 1.5rem; background: #0f3460; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
  .search-box button:hover { background: #16213e; }
  .search-box button:disabled { background: #999; cursor: not-allowed; }
  .suggestions { border: 1px solid #e0e0e0; border-radius: 8px; max-height: 200px; overflow-y: auto; display: none; background: #fff; margin-top: -1rem; margin-bottom: 1rem; }
  .suggestions div { padding: 0.5rem 1rem; cursor: pointer; }
  .suggestions div:hover { background: #f0f4ff; }
  .result-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #f0f0f0; }
  .result-header h2 { font-size: 1.25rem; }
  .badge { padding: 0.35rem 0.75rem; border-radius: 20px; font-weight: 600; font-size: 0.8rem; }
  .badge.ELIGIBLE { background: #d4edda; color: #155724; }
  .badge.REJECTED { background: #f8d7da; color: #721c24; }
  .badge.CONDITIONAL { background: #fff3cd; color: #856404; }
  .badge.NOT_APPLICABLE { background: #e2e3e5; color: #383d41; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .detail-item { display: flex; flex-direction: column; }
  .detail-item .label { font-size: 0.75rem; text-transform: uppercase; color: #888; letter-spacing: 0.5px; }
  .detail-item .value { font-size: 0.95rem; font-weight: 500; }
  .section-title { font-size: 0.85rem; text-transform: uppercase; color: #888; letter-spacing: 0.5px; margin: 1rem 0 0.5rem; }
  .gate { padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 0.35rem; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }
  .gate.PASS { background: #d4edda; color: #155724; }
  .gate.FAIL { background: #f8d7da; color: #721c24; }
  .gate.SKIP { background: #e2e3e5; color: #383d41; }
  .rationale { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #f0f0f0; }
  .rationale li { padding: 0.25rem 0; font-size: 0.9rem; color: #555; }
  .status-icon { display: inline-block; width: 20px; text-align: center; }
  .pillar { padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 0.35rem; font-size: 0.9rem; background: #e8f4f8; color: #0c5460; }
  .loading { text-align: center; color: #888; padding: 2rem; }
  .error { background: #f8d7da; color: #721c24; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
  .clear-btn { background: none; border: 1px solid #ccc; color: #666; padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .clear-btn:hover { background: #f0f0f0; }
</style>
</head>
<body>
<div class="container">
  <h1>RX Database & OKT Engine</h1>
  <p class="subtitle">Prescription Drug Lookup & Obat Keras Tertentu (OKT) Eligibility Evaluation</p>

  <div class="search-box">
    <input type="text" id="drugInput" placeholder="Enter drug name (e.g., omeprazole, amoksisilin, simvastatin)" autocomplete="off">
    <button id="searchBtn">Evaluate</button>
    <button class="clear-btn" id="clearBtn">Clear</button>
  </div>

  <div id="suggestions" class="suggestions"></div>
  <div id="error" class="error" style="display:none"></div>
  <div id="result"></div>
  <div id="loading" class="loading" style="display:none">Evaluating...</div>
</div>

<script>
const drugInput = document.getElementById('drugInput');
const searchBtn = document.getElementById('searchBtn');
const clearBtn = document.getElementById('clearBtn');
const resultDiv = document.getElementById('result');
const errorDiv = document.getElementById('error');
const loadingDiv = document.getElementById('loading');
const suggestionsDiv = document.getElementById('suggestions');

let searchTimeout = null;

drugInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = drugInput.value.trim();
  if (q.length < 2) { suggestionsDiv.style.display = 'none'; return; }
  searchTimeout = setTimeout(() => fetchSuggestions(q), 200);
});

drugInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchBtn.click(); });

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-box') && !e.target.closest('.suggestions')) suggestionsDiv.style.display = 'none';
});

async function fetchSuggestions(q) {
  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(q));
    const data = await res.json();
    if (!data.length) { suggestionsDiv.style.display = 'none'; return; }
    suggestionsDiv.innerHTML = data.map(d => `<div onclick="selectSuggestion('${d.replace(/'/g, "\\'")}')">${highlight(d, q)}</div>`).join('');
    suggestionsDiv.style.display = 'block';
  } catch { suggestionsDiv.style.display = 'none'; }
}

function highlight(text, query) {
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<strong>' + text.slice(idx, idx + query.length) + '</strong>' + text.slice(idx + query.length);
}

function selectSuggestion(name) {
  drugInput.value = name;
  suggestionsDiv.style.display = 'none';
  searchBtn.click();
}

searchBtn.addEventListener('click', evaluate);
clearBtn.addEventListener('click', () => {
  drugInput.value = '';
  resultDiv.innerHTML = '';
  errorDiv.style.display = 'none';
  suggestionsDiv.style.display = 'none';
  drugInput.focus();
});

async function evaluate() {
  const drug = drugInput.value.trim();
  if (!drug) return;
  errorDiv.style.display = 'none';
  loadingDiv.style.display = 'block';
  resultDiv.innerHTML = '';
  suggestionsDiv.style.display = 'none';
  searchBtn.disabled = true;

  try {
    const res = await fetch('/api/evaluate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ drug, context: 'auto' })
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    renderResult(data);
  } catch (err) {
    showError(err.message);
  } finally {
    loadingDiv.style.display = 'none';
    searchBtn.disabled = false;
  }
}

function showError(msg) {
  errorDiv.textContent = msg;
  errorDiv.style.display = 'block';
}

function renderResult(data) {
  const badgeClass = data.eligibility || 'UNKNOWN';
  let html = `<div class="result-card">
    <div class="result-header">
      <h2>${escapeHtml(data.drug)}</h2>
      <span class="badge ${badgeClass}">${badgeClass}</span>
    </div>
    <div class="detail-grid">
      <div class="detail-item"><span class="label">Classification</span><span class="value">${data.classification || '-'}</span></div>
      <div class="detail-item"><span class="label">Context</span><span class="value">${data.requested_context || '-'}</span></div>
      <div class="detail-item"><span class="label">Grounds</span><span class="value">${(data.grounds || []).join(', ') || '-'}</span></div>
      <div class="detail-item"><span class="label">Response Time</span><span class="value">${data.execution_time_ms || 0}ms</span></div>
    </div>`;

  if (data.gate_results && data.gate_results.length) {
    html += `<div class="section-title">Safety Gates</div>`;
    for (const g of data.gate_results) {
      const sym = g.status === 'PASS' ? '\u2713' : g.status === 'FAIL' ? '\u2717' : '-';
      html += `<div class="gate ${g.status}"><span class="status-icon">${sym}</span> <strong>${g.gate}</strong> ${g.name}: ${g.detail}</div>`;
    }
  }

  if (data.pillar_evaluation && data.pillar_evaluation.length) {
    html += `<div class="section-title">OKT Pillars</div>`;
    for (const p of data.pillar_evaluation) {
      html += `<div class="pillar"><strong>${p.name}</strong> (${p.pillar}) - ${p.status}</div>`;
    }
  }

  if (data.rationale && data.rationale.length) {
    html += `<div class="section-title">Rationale</div><ul class="rationale">`;
    for (const r of data.rationale) html += `<li>${escapeHtml(r)}</li>`;
    html += `</ul>`;
  }

  if (Object.keys(data.restrictions || {}).length) {
    html += `<div class="section-title">Restrictions</div><pre style="background:#f8f9fa;padding:0.75rem;border-radius:6px;font-size:0.85rem">${JSON.stringify(data.restrictions, null, 2)}</pre>`;
  }

  html += '</div>';
  resultDiv.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
